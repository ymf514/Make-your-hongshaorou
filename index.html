<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>loading</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #8B4513 0%, #A0522D 100%);
            font-family: 'Arial', sans-serif;
            color: #fff;
        }
        
        .loading-container {
            text-align: center;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            margin: 0 auto 20px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        h2 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        p {
            font-size: 14px;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="loading-container">
        <div class="spinner"></div>
        <h2>红烧肉</h2>
        <p>正在为您加载最佳体验...</p>
    </div>

    <script>
        // 检测设备类型并重定向
        function redirectToAppropriateVersion() {
            // 检测移动设备的正则表达式
            const mobileRegex = /android|webos|iphone|ipad|ipod|blackberry|iemobile|opera mini/i;
            
            // 获取用户代理字符串
            const userAgent = navigator.userAgent;
            
            // 判断是否为移动设备
            const isMobile = mobileRegex.test(userAgent);
            
            // 获取窗口宽度（作为额外判断依据）
            const windowWidth = window.innerWidth;
            
            // 如果是移动设备或窗口宽度小于768px，跳转到移动版
            if (isMobile || windowWidth < 768) {
                window.location.href = 'hongshaorou-mobile.html';
            } else {
                // 否则跳转到桌面版
                window.location.href = 'hongshaorou.html';
            }
        }
        
        // 页面加载完成后进行重定向
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', redirectToAppropriateVersion);
        } else {
            redirectToAppropriateVersion();
        }
    </script>
</body>
</html>
